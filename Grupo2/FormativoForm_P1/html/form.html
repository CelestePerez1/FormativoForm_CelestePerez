<!-- Formulario de registro de persona, envío por método GET. -->
<!-- Campos: nombre, sexo, nacionalidad, intereses y descripción. -->
<!-- Los datos se envían a php/procesar.php para su validación. -->
<div class="container" style="margin-top: 30px;">

    <!-- Titulo -->
    <div class="row">
        <div class="col-sm-12 text-center">
            <h2><strong>Formulario de Registro</strong></h2>
            <p class="text-muted">Método GET</p>
            <hr>
        </div>
    </div>

    <!-- Formulario -->
    <div class="row">
        <div class="col-sm-8 col-sm-offset-2">
            <div class="panel panel-default">
                <div class="panel-heading"><strong>Ingrese sus datos</strong></div>
                <div class="panel-body">

                    <!-- action apunta a procesar.php, method GET -->
                    <form id="formulario" method="GET" action="php/procesar.php">

                        <!-- Nombre y apellido -->
                        <div class="form-group">
                            <label>Nombre y Apellido</label>
                            <input type="text" name="nombre_apellido" class="form-control" 
                                   placeholder="Ingrese nombre y apellido"
                                   pattern="[A-Za-záéíóúÁÉÍÓÚñÑ\s]+" 
                                   required>
                        </div>

                        <!-- Sexo -->
                        <div class="form-group">
                            <label>Sexo</label><br>
                            <label class="radio-inline">
                                <input type="radio" name="sexo" value="Femenino" required> Femenino
                            </label>
                            <label class="radio-inline">
                                <input type="radio" name="sexo" value="Masculino"> Masculino
                            </label>
                        </div>

                        <!-- Nacionalidad -->
                        <div class="form-group">
                            <label>Nacionalidad</label>
                            <select name="nacionalidad" class="form-control" required>
                                <option value="">--- Seleccione ---</option>
                                <option value="Argentina">Argentina</option>
                                <option value="Bolivia">Bolivia</option>
                                <option value="Brasil">Brasil</option>
                                <option value="Chile">Chile</option>
                                <option value="Panama">Panamá</option>
                                <option value="Paraguay">Paraguay</option>
                                <option value="Uruguay">Uruguay</option>
                            </select>
                        </div>

                        <!-- Intereses -->
                        <div class="form-group">
                            <label>Intereses</label><br>
                            <label class="checkbox-inline">
                                <input type="checkbox" name="intereses[]" value="Cine"> Cine
                            </label>
                            <label class="checkbox-inline">
                                <input type="checkbox" name="intereses[]" value="Deportes"> Deportes
                            </label>
                            <label class="checkbox-inline">
                                <input type="checkbox" name="intereses[]" value="Internet"> Internet
                            </label>
                            <label class="checkbox-inline">
                                <input type="checkbox" name="intereses[]" value="Libros"> Libros
                            </label>
                            <label class="checkbox-inline">
                                <input type="checkbox" name="intereses[]" value="Musica"> Música
                            </label>
                        </div>

                        <!-- Acerca de usted -->
                        <div class="form-group">
                            <label>Acerca de Usted</label>
                            <textarea name="acerca_de_vos" class="form-control" 
                                      rows="5" placeholder="Cuéntanos sobre ti..." required></textarea>
                        </div>

                        <!-- Boton enviar -->
                        <div class="text-center">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <span class="glyphicon glyphicon-send"></span> Enviar
                            </button>
                            <button type="reset" class="btn btn-default btn-lg">
                                <span class="glyphicon glyphicon-refresh"></span> Limpiar
                            </button>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>

</div>
